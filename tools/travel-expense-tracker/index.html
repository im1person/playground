<!DOCTYPE html>
<html lang="zh-Hant-HK">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Expense Tracker</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Markdown (marked + DOMPurify) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        html.dark body {
            background-color: #111827;
        }

        .bottom-nav-item.active {
            color: #2563eb;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .note-content h1 { font-size: 1.25rem; font-weight: 700; margin: 0.75rem 0 0.25rem; }
        .note-content h2 { font-size: 1.1rem; font-weight: 700; margin: 0.6rem 0 0.2rem; }
        .note-content h3 { font-size: 1rem; font-weight: 600; margin: 0.5rem 0 0.15rem; }
        .note-content p { margin: 0.35rem 0; }
        .note-content ul { list-style: disc; padding-left: 1.25rem; margin: 0.25rem 0; }
        .note-content ol { list-style: decimal; padding-left: 1.25rem; margin: 0.25rem 0; }
        .note-content li { margin: 0.1rem 0; }
        .note-content strong { font-weight: 700; }
        .note-content em { font-style: italic; }
        .note-content a { color: #2563eb; text-decoration: underline; }
        .note-content code { background: rgba(0,0,0,0.06); padding: 0.1em 0.3em; border-radius: 0.25rem; font-size: 0.85em; }
        .note-content pre { background: rgba(0,0,0,0.06); padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .note-content pre code { background: none; padding: 0; }
        .note-content blockquote { border-left: 3px solid #d97706; padding-left: 0.75rem; margin: 0.5rem 0; color: #92400e; }
        .note-content hr { border: none; border-top: 1px solid #e5e7eb; margin: 0.75rem 0; }
        .note-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.85em; }
        .note-content th, .note-content td { border: 1px solid #e5e7eb; padding: 0.35rem 0.5rem; text-align: left; }
        .note-content th { background: rgba(0,0,0,0.04); font-weight: 600; }

        /* Dark mode overrides for .note-content */
        html.dark .note-content a { color: #60a5fa; }
        html.dark .note-content code { background: rgba(255,255,255,0.1); }
        html.dark .note-content pre { background: rgba(255,255,255,0.08); }
        html.dark .note-content blockquote { border-left-color: #fbbf24; color: #fcd34d; }
        html.dark .note-content hr { border-top-color: #374151; }
        html.dark .note-content th, html.dark .note-content td { border-color: #374151; }
        html.dark .note-content th { background: rgba(255,255,255,0.06); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#475569',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-slate-800 dark:text-gray-200 pb-20">

    <!-- Header / Top Bar -->
    <header class="fixed top-0 w-full bg-white/90 dark:bg-gray-900/90 backdrop-blur-md shadow-sm z-50 p-4 border-b border-gray-100 dark:border-gray-700">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                Travel Tracker</h1>
            <div class="flex gap-2">
                <button id="btn-export-header" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition"
                    onclick="showExportModal()">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-md mx-auto pt-20 px-4 min-h-screen relative">

        <!-- View: Dashboard -->
        <div id="view-dashboard" class="space-y-6 animate-fade-in">
            <!-- Filter Toggle (Trip Dates only) -->
            <div id="date-filter-container" class="hidden flex justify-end items-center mb-2">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="toggle-date-filter" class="sr-only peer">
                    <div
                        class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600">
                    </div>
                    <span class="ms-3 text-xs font-medium text-gray-700 dark:text-gray-300">只顯示行程內 (Trip Dates Only)</span>
                </label>
            </div>

            <!-- General Note (Markdown rendered, collapsible) -->
            <div id="general-note-container" class="hidden">
                <div class="bg-amber-50 dark:bg-gray-800 rounded-2xl shadow-sm border border-amber-100 dark:border-gray-700 relative overflow-hidden">
                    <div class="flex items-center justify-between px-4 pt-3 pb-2 cursor-pointer select-none" onclick="toggleNoteCollapse()">
                        <div class="flex items-center gap-1.5 text-amber-700 dark:text-amber-400 text-xs font-bold uppercase">
                            <i data-lucide="notebook-pen" class="w-3.5 h-3.5"></i> 行程備註 (Notes)
                        </div>
                        <div class="flex items-center gap-1.5">
                            <button onclick="event.stopPropagation(); copyNoteToClipboard()" class="p-1 rounded hover:bg-amber-200/50 dark:hover:bg-gray-700 text-amber-500 dark:text-amber-400 hover:text-amber-700 transition" title="複製 (Copy)">
                                <i data-lucide="clipboard-copy" class="w-3.5 h-3.5"></i>
                            </button>
                            <button onclick="event.stopPropagation(); switchTab('settings')" class="text-[10px] text-amber-600 dark:text-amber-400 hover:text-amber-800 font-medium">編輯</button>
                            <i id="note-collapse-icon" data-lucide="chevron-up" class="w-4 h-4 text-amber-400 transition-transform duration-300"></i>
                        </div>
                    </div>
                    <div id="general-note-body" class="transition-all duration-300 ease-in-out overflow-hidden">
                        <div id="general-note-content" class="note-content text-sm text-gray-700 dark:text-gray-200 leading-relaxed px-4 pb-4"></div>
                    </div>
                </div>
            </div>

            <!-- Summary Card -->
            <div
                class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-lg shadow-blue-500/5 border border-blue-50 dark:border-gray-700 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 dark:bg-blue-900/20 rounded-full -mr-10 -mt-10 opacity-50 z-0">
                </div>
                <div class="relative z-10">
                    <div class="text-sm text-gray-500 dark:text-gray-400 mb-1 font-medium">總支出 (Total Expenses)</div>
                    <div class="text-3xl font-bold text-slate-800 dark:text-gray-100" id="total-expense-display">$0</div>

                    <div class="mt-4">
                        <div class="flex justify-between text-xs text-gray-500 dark:text-gray-400 mb-1">
                            <span>預算 (Budget)</span>
                            <span id="budget-progress-text">0%</span>
                        </div>
                        <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-2.5 overflow-hidden">
                            <div id="budget-progress-bar"
                                class="bg-blue-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%">
                            </div>
                        </div>
                        <div class="mt-1 text-right text-xs font-medium text-gray-400">
                            剩餘: <span id="budget-remaining" class="text-gray-600 dark:text-gray-300">$0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chart -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4">支出分析 (Analytics)</h3>
                <div class="relative h-48 w-full flex justify-center">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <!-- Recent Transactions Preview -->
            <div>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">最近記錄 (Recent)</h3>
                    <button onclick="switchTab('list')" class="text-xs text-blue-600 font-medium">查看全部</button>
                </div>
                <div id="recent-list" class="space-y-3">
                    <!-- Items will be injected here -->
                    <div class="text-center text-gray-400 py-4 text-sm">暫無記錄</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="shareSummary()"
                    class="flex items-center justify-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 py-3 rounded-xl font-medium hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition">
                    <i data-lucide="share-2" class="w-4 h-4"></i> 分享摘要
                </button>
                <button onclick="showExportModal()"
                    class="flex items-center justify-center gap-2 bg-teal-50 dark:bg-teal-900/30 text-teal-600 dark:text-teal-400 py-3 rounded-xl font-medium hover:bg-teal-100 dark:hover:bg-teal-900/50 transition">
                    <i data-lucide="save" class="w-4 h-4"></i> 備份資料
                </button>
            </div>
        </div>

        <!-- View: List -->
        <div id="view-list" class="hidden space-y-4 pb-24">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">支出列表 (Expenses)</h2>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400">按天分組</span>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="toggle-group-day" class="sr-only peer">
                        <div
                            class="relative w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600">
                        </div>
                    </label>
                </div>
            </div>
            <!-- Search Bar -->
            <div class="relative">
                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                <input type="text" id="expense-search" placeholder="搜尋支出 (Search expenses)..."
                    class="w-full pl-9 pr-8 py-2.5 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:text-gray-100">
                <button id="expense-search-clear" class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:text-gray-300">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <!-- Category filter + Payment filter + Sort -->
            <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex flex-wrap gap-1.5" id="filter-category-wrap">
                    <button type="button" class="filter-cat-btn filter-cat-active px-2.5 py-1 rounded-lg text-xs font-medium bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300" data-cat="all">全部</button>
                    <button type="button" class="filter-cat-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-cat="general">一般</button>
                    <button type="button" class="filter-cat-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-cat="accommodation">住宿</button>
                    <button type="button" class="filter-cat-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-cat="transport">交通</button>
                </div>
                <select id="list-sort" class="text-xs py-1.5 pl-2 pr-7 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="dateDesc">日期 新→舊</option>
                    <option value="dateAsc">日期 舊→新</option>
                    <option value="amountDesc">金額 高→低</option>
                    <option value="amountAsc">金額 低→高</option>
                </select>
            </div>
            <!-- Payment method filter -->
            <div class="flex flex-wrap gap-1.5">
                <button type="button" class="filter-pay-btn filter-pay-active px-2.5 py-1 rounded-lg text-xs font-medium bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300" data-pay="all">全部付款</button>
                <button type="button" class="filter-pay-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-pay="cash">現金</button>
                <button type="button" class="filter-pay-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-pay="ic_card">IC卡</button>
                <button type="button" class="filter-pay-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-pay="card">碌卡</button>
                <button type="button" class="filter-pay-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-pay="e_pay">電子付款</button>
                <button type="button" class="filter-pay-btn px-2.5 py-1 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500" data-pay="paid_other">代付</button>
            </div>
            <div id="full-list" class="space-y-3">
                <!-- Items injected here -->
            </div>
        </div>

        <!-- View: Settings -->
        <div id="view-settings" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100 mb-4">設定 (Settings)</h2>

            <!-- Theme -->
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="palette" class="w-4 h-4 text-gray-500 dark:text-gray-400"></i>
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">外觀 (Theme)</span>
                    </div>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="setting-theme-dark" class="sr-only peer">
                        <div class="relative w-11 h-6 bg-gray-200 dark:bg-gray-600 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-500 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        <span class="ms-2 text-xs text-gray-600 dark:text-gray-400">深色模式 (Dark)</span>
                    </label>
                </div>
            </div>

            <!-- Location Setting -->
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">旅遊地點 (Location)</label>
                <input type="text" id="setting-location"
                    class="w-full p-2 border border-gray-200 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 dark:text-gray-100 mb-3"
                    placeholder="例如: 東京之旅">

                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">時區 (Timezone)</label>
                <div class="relative mb-3">
                    <select id="setting-timezone"
                        class="w-full p-2 border border-gray-200 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white dark:bg-gray-700 dark:text-gray-100">
                        <option value="">Browser Default (Auto)</option>
                        <optgroup label="Asia">
                            <option value="Asia/Hong_Kong">🇭🇰 香港/台灣/北京 (GMT+8)</option>
                            <option value="Asia/Tokyo">🇯🇵 日本/韓國 (GMT+9)</option>
                            <option value="Asia/Bangkok">🇹🇭 泰國/越南 (GMT+7)</option>
                            <option value="Asia/Singapore">🇸🇬 新加坡/馬來西亞 (GMT+8)</option>
                            <option value="Asia/Dubai">🇦🇪 杜拜 (GMT+4)</option>
                        </optgroup>
                        <optgroup label="Europe">
                            <option value="Europe/London">🇬🇧 英國 (GMT+0/1)</option>
                            <option value="Europe/Paris">🇪🇺 中歐 (法/德/義) (GMT+1/2)</option>
                        </optgroup>
                        <optgroup label="America">
                            <option value="America/New_York">🇺🇸 美東 (紐約) (GMT-5/4)</option>
                            <option value="America/Los_Angeles">🇺🇸 美西 (洛杉磯) (GMT-8/7)</option>
                        </optgroup>
                        <optgroup label="Oceania">
                            <option value="Australia/Sydney">🇦🇺 雪梨 (GMT+10/11)</option>
                        </optgroup>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                        <i data-lucide="globe" class="w-4 h-4"></i>
                    </div>
                </div>

                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">行程日期 (Trip Dates)</label>
                <div class="flex gap-2">
                    <input type="date" id="setting-start-date"
                        class="w-full p-2 border border-gray-200 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 dark:text-gray-100">
                    <span class="self-center text-gray-400">-</span>
                    <input type="date" id="setting-end-date"
                        class="w-full p-2 border border-gray-200 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 dark:text-gray-100">
                </div>
            </div>

            <!-- General Note -->
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        <span class="flex items-center gap-1.5">
                            <i data-lucide="notebook-pen" class="w-4 h-4 text-amber-500"></i>
                            行程備註 (Notes)
                        </span>
                    </label>
                    <button type="button" id="note-preview-toggle" onclick="toggleNotePreview()"
                        class="flex items-center gap-1 px-2 py-1 rounded-lg text-[10px] font-medium bg-gray-100 dark:bg-gray-600 text-gray-500 dark:text-gray-300 hover:bg-blue-100 hover:text-blue-600 transition">
                        <i data-lucide="eye" class="w-3 h-3"></i> 預覽
                    </button>
                </div>
                <div id="note-edit-area">
                    <textarea id="setting-general-note" rows="4"
                        class="w-full p-3 border border-gray-200 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm leading-relaxed font-mono resize-none overflow-hidden bg-white dark:bg-gray-700 dark:text-gray-100"
                        placeholder="支援 Markdown 格式。行程計劃、總備忘或每日備註&#10;Supports Markdown. Travel plan, general notes, or daily notes&#10;&#10;## Day 1&#10;- 景點 A&#10;- 餐廳 B"></textarea>
                    <div class="text-[10px] text-gray-400 mt-1">支援 Markdown：標題(#)、清單(-)、**粗體**、*斜體** 等</div>
                </div>
                <div id="note-preview-area" class="hidden">
                    <div id="note-preview-content" class="note-content text-sm text-gray-700 dark:text-gray-200 leading-relaxed p-3 bg-amber-50/50 dark:bg-amber-900/20 border border-amber-100 dark:border-amber-800 rounded-lg min-h-[6rem]"></div>
                </div>
            </div>

            <!-- Base Currency Setting -->
            <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">本幣 (Home Currency)</label>
                <input type="text" id="setting-home-currency"
                    class="w-full p-2 border border-gray-200 dark:border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 dark:text-gray-100"
                    value="HKD">
                <div class="flex gap-2 mt-2 flex-wrap" id="setting-currency-quick">
                    <button class="px-2 py-1 bg-gray-100 dark:bg-gray-600 rounded text-xs text-gray-600 dark:text-gray-300 hover:bg-blue-100 hover:text-blue-600" onclick="setCurrency('setting-home-currency', 'HKD')">HKD</button>
                    <button class="px-2 py-1 bg-gray-100 dark:bg-gray-600 rounded text-xs text-gray-600 dark:text-gray-300 hover:bg-blue-100 hover:text-blue-600" onclick="setCurrency('setting-home-currency', 'JPY')">JPY</button>

                            </div>
                            <div>
                                <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">晚數 (Nights)</label>
                                <input type="number" id="inp-nights"
                                    class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-700 dark:text-gray-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" id="inp-spread-cost"
                                class="w-4 h-4 text-indigo-600 rounded border-gray-300 dark:border-gray-600 focus:ring-indigo-500">
                            <label for="inp-spread-cost" class="text-sm text-gray-600 dark:text-gray-300">平均分攤到入住日 (Spread Cost per Night)</label>
                        </div>
                    </div>

                    <!-- Transport/Flight Fields -->
                    <div id="fields-transport" class="hidden space-y-3 mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                        <div class="flex items-center gap-2 text-teal-600 dark:text-teal-400 mb-2">
                            <i data-lucide="plane" class="w-4 h-4"></i> <span class="text-sm font-bold">航班/交通詳情</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">航班號 (Flight No)</label>
                                <input type="text" id="inp-flight-no"
                                    class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-700 dark:text-gray-100 border-none rounded-xl focus:ring-2 focus:ring-teal-500 outline-none">
                            </div>
                            <div>
                                <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">航空公司 (Airline)</label>
                                <input type="text" id="inp-airline"
                                    class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-700 dark:text-gray-100 border-none rounded-xl focus:ring-2 focus:ring-teal-500 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">時間 (Departure Time)</label>
                            <input type="datetime-local" id="inp-departure"
                                class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-700 dark:text-gray-100 border-none rounded-xl focus:ring-2 focus:ring-teal-500 outline-none">
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                        <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">備註 (Notes)</label>
                        <textarea id="inp-note" rows="2"
                            class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-700 dark:text-gray-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-300 dark:placeholder-gray-500 text-sm"
                            placeholder="例如: 於 1/15 預購 (Purchased on 1/15)..."></textarea>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                        <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase">收據 (Receipt)</label>
                        <div id="receipt-preview-container" class="mt-2 hidden">
                            <img id="receipt-preview" class="w-full rounded-xl border border-gray-200 dark:border-gray-600 shadow-sm mb-2 max-h-48 object-cover">
                            <button type="button" onclick="removeReceipt()" class="text-xs text-red-500 font-medium">移除相片 (Remove Photo)</button>
                        </div>
                        <div id="receipt-upload-btn" class="mt-2">
                            <button type="button" onclick="document.getElementById('inp-receipt').click()" 
                                class="w-full py-3 border-2 border-dashed border-gray-200 dark:border-gray-600 rounded-xl text-gray-400 text-sm hover:border-blue-400 hover:text-blue-500 transition">
                                <i data-lucide="camera" class="w-4 h-4 inline-block mr-1"></i> 撳呢度影相或上傳收據
                            </button>
                            <input type="file" id="inp-receipt" accept="image/*" class="hidden" onchange="handleReceiptSelection(event)">
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="submit"
                            class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 active:scale-[0.98] transition">儲存
                            (Save)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- View: Trip Selection -->
    <div id="view-trip-select" class="hidden absolute inset-0 bg-gray-50 dark:bg-gray-900 z-[60] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto space-y-6">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">My Trips</h2>
            <div id="trip-list-container" class="space-y-3">
                <!-- Trips injected here -->
            </div>
            <button onclick="createNewTrip()"
                class="w-full py-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl text-gray-500 dark:text-gray-400 font-medium hover:border-blue-500 hover:text-blue-500 transition">
                + Create New Trip
            </button>
            <button
                onclick="document.getElementById('view-trip-select').classList.add('hidden'); document.getElementById('view-dashboard').classList.remove('hidden');"
                class="w-full py-3 text-gray-400 dark:text-gray-500 font-sm">
                Cancel
            </button>
        </div>
    </div>

<!-- Scripts (ES Module) -->
    <script type="module" src="./js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA: Service Worker registered'))
                    .catch(err => console.log('PWA: SW registration failed', err));
            });
        }
    </script>
    <!-- Undo Toast -->
    <div id="undo-toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-[90] hidden">
        <div class="flex items-center gap-3 bg-gray-800 dark:bg-gray-700 text-white text-sm px-4 py-3 rounded-xl shadow-lg">
            <span id="undo-toast-msg">已刪除</span>
            <button id="undo-toast-btn" class="font-bold text-blue-400 hover:text-blue-300 uppercase text-xs tracking-wider">復原</button>
        </div>
    </div>

    <!-- View: Lightbox (Fullscreen Image) -->
    <div id="lightbox" class="fixed inset-0 bg-black/90 z-[100] hidden flex flex-col items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="lightbox-img" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
        <div id="lightbox-caption" class="text-white mt-4 font-medium" onclick="event.stopPropagation()"></div>
    </div>

</body>

</html>
