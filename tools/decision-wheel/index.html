<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-en="Decision Wheel" data-zh-HK="抽籤輪盤">Decision Wheel</title>
    <link rel="stylesheet" href="../../assets/style.css" />
    <style>
      body { font-family: Arial, sans-serif; max-width: 480px; margin: 0 auto; padding: 20px; transition: background-color 0.3s, color 0.3s; }
      body.dark { background: #181c1f; color: #f0f0f0; }
      body.light-mode { background: #f0f0f0; color: #222; }
      .container { margin-top: 60px; }
      h1 { text-align: center; margin-bottom: 24px; font-size: 1.5em; }
      .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
      body.dark .section { background: #23272a; }
      label { display: block; margin-bottom: 6px; }
      textarea { width: 100%; box-sizing: border-box; min-height: 100px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
      body.dark textarea { background: #333; border-color: #555; color: #f0f0f0; }
      button { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; background: #1976d2; color: #fff; margin-top: 12px; }
      body.dark button { background: #90caf9; color: #111; }
      .wheel-wrap { position: relative; width: 260px; height: 260px; margin: 20px auto; }
      .wheel-pointer { position: absolute; left: 50%; top: -8px; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #d32f2f; z-index: 2; }
      body.dark .wheel-pointer { border-top-color: #ef5350; }
      .wheel { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; }
      .wheel-segment { position: absolute; left: 0; top: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.7em; padding: 0; box-sizing: border-box; pointer-events: none; }
      .wheel-segment span { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); white-space: nowrap; }
      #result { margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 8px; font-size: 1.2em; font-weight: bold; text-align: center; min-height: 1.5em; }
      body.dark #result { background: #333; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="mainTitle" data-en="Decision Wheel" data-zh-HK="抽籤輪盤">Decision Wheel</h1>
      <div class="section">
        <label data-en="Options (one per line or comma-separated)" data-zh-HK="選項（每行一個或逗號分隔）">Options (one per line or comma-separated)</label>
        <textarea id="optionsInput" placeholder="e.g. Rice, Noodles, Pizza" data-placeholder-en="e.g. Rice, Noodles, Pizza" data-placeholder-zh-HK="例如：飯、麵、薄餅"></textarea>
        <button id="spinBtn" data-en="Spin" data-zh-HK="抽">Spin</button>
        <div class="wheel-wrap">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div class="wheel" id="wheel" role="img" aria-label="Wheel"></div>
        </div>
        <div id="result" aria-live="polite"></div>
      </div>
    </div>
    <script src="decision-wheel.js"></script>
    <script type="module">
      import { initThemeToggle } from "../../assets/theme-toggle.js";
      import { initLocaleMenu } from "../../assets/locale-menu.js";
      import { initHeader } from "../../assets/header.js";
      initHeader("../../index.html");
      initThemeToggle();
      initLocaleMenu();
    </script>
  </body>
</html>
