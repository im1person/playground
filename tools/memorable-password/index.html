<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-en="Memorable Password Generator" data-zh-HK="易記密碼生成器">
      Memorable Password Generator
    </title>
    <link rel="stylesheet" href="../../assets/style.css" />
    <style>
      body { font-family: Arial, sans-serif; max-width: 560px; margin: 0 auto; padding: 20px; transition: background-color 0.3s, color 0.3s; }
      body.dark { background: #181c1f; color: #f0f0f0; }
      body.light-mode { background: #f0f0f0; color: #222; }
      .container { margin-top: 60px; }
      h1 { text-align: center; margin-bottom: 24px; font-size: 1.5em; }
      .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
      body.dark .section { background: #23272a; }
      label { display: block; margin-bottom: 6px; }
      select, input[type="number"] { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; }
      body.dark select, body.dark input[type="number"] { background: #333; border-color: #555; color: #f0f0f0; }
      button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; background: #1976d2; color: #fff; }
      body.dark button { background: #90caf9; color: #111; }
      button:hover { opacity: 0.9; }
      #output { font-family: monospace; font-size: 1.1em; word-break: break-all; padding: 12px; background: #f5f5f5; border-radius: 8px; margin-top: 12px; min-height: 2em; }
      body.dark #output { background: #333; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
      .row label { margin-bottom: 0; margin-right: 8px; }
      .copy-btn { margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="mainTitle" data-en="Memorable Password Generator" data-zh-HK="易記密碼生成器">
        Memorable Password Generator
      </h1>
      <div class="section">
        <label data-en="Mode:" data-zh-HK="模式：">Mode:</label>
        <select id="mode">
          <option value="memorable" data-en="Memorable (words)" data-zh-HK="易記（詞組）">Memorable (words)</option>
          <option value="random" data-en="Random string" data-zh-HK="隨機字串">Random string</option>
        </select>
        <div id="memorableOpts">
          <div class="row">
            <label data-en="Words:" data-zh-HK="詞數：">Words:</label>
            <input type="number" id="wordCount" min="4" max="8" value="5" />
          </div>
        </div>
        <div id="randomOpts" style="display:none;">
          <div class="row">
            <label data-en="Length:" data-zh-HK="長度：">Length:</label>
            <input type="number" id="length" min="8" max="64" value="16" />
          </div>
          <label><input type="checkbox" id="uppercase" checked /> <span data-en="Uppercase" data-zh-HK="大寫">Uppercase</span></label>
          <label><input type="checkbox" id="lowercase" checked /> <span data-en="Lowercase" data-zh-HK="小寫">Lowercase</span></label>
          <label><input type="checkbox" id="numbers" checked /> <span data-en="Numbers" data-zh-HK="數字">Numbers</span></label>
          <label><input type="checkbox" id="symbols" /> <span data-en="Symbols" data-zh-HK="符號">Symbols</span></label>
        </div>
        <button id="generateBtn" data-en="Generate" data-zh-HK="生成">Generate</button>
        <button id="copyBtn" class="copy-btn" data-en="Copy" data-zh-HK="複製">Copy</button>
        <div id="output" aria-live="polite"></div>
      </div>
    </div>
    <script src="memorable-password.js"></script>
    <script type="module">
      import { initThemeToggle } from "../../assets/theme-toggle.js";
      import { initLocaleMenu } from "../../assets/locale-menu.js";
      import { initHeader } from "../../assets/header.js";
      initHeader("../../index.html");
      initThemeToggle();
      initLocaleMenu();
    </script>
  </body>
</html>
