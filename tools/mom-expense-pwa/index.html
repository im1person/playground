<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="屋企數簿">
  <link rel="apple-touch-icon" href="icon-512.png">
  <title>記帳</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #10223a;
      --muted: #5f6f82;
      --primary: #2164f3;
      --primary-press: #144cc3;
      --danger: #ea4335;
      --danger-press: #be2e22;
      --ok: #18a856;
      --ok-press: #118043;
      --border: #d9e2ef;
      --shadow: 0 8px 24px rgba(16, 34, 58, 0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(100%, 560px);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 10px 16px 0;
    }

    .view {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      padding-bottom: 80px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .view::-webkit-scrollbar {
      display: none;
    }

    .view.active {
      display: flex;
    }

    #view-entry {
      overflow-y: hidden !important;
    }

    .display {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .display-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    .amount-text {
      margin: 0;
      font-size: clamp(2rem, 8vw, 2.8rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0.02em;
      word-break: break-all;
    }

    .selected-category {
      margin-top: 2px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      min-height: 1.2em;
      visibility: hidden;
    }

    .selected-category.is-picked {
      visibility: visible;
    }

    .hint {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      flex-shrink: 0;
      min-height: 0;
      overflow-y: auto;
      max-height: 200px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .category-grid::-webkit-scrollbar {
      display: none;
    }

    .btn {
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: transform 0.08s ease, filter 0.08s ease, box-shadow 0.08s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .btn:active {
      transform: scale(0.97);
      filter: brightness(0.95);
    }

    .btn:focus-visible {
      outline: 3px solid #8bb2ff;
      outline-offset: 2px;
    }

    .category-btn {
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
      min-height: 68px;
      min-width: 0;
      padding: 8px 4px;
      display: grid;
      gap: 2px;
      justify-items: center;
      align-content: center;
      font-size: 0.82rem;
    }

    .entry-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .entry-meta-row--category .selected-category {
      margin-top: 2px;
      width: 100%;
    }

    .payment-status-group {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      flex-shrink: 0;
    }

    .payment-status-btn {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      background: #f8fbff;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .payment-status-btn.active-paid {
      border-color: var(--ok);
      background: #e8f8ee;
      color: #0d6e36;
    }

    .payment-status-btn.active-unpaid {
      border-color: var(--danger);
      background: #fdecea;
      color: #b3261e;
    }

    .entry-dates-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .entry-date-primary {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .entry-dynamic-label,
    .due-date-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
    }

    .month-picker,
    .entry-date-input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 4px 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .entry-date-input {
      font-size: 0.9rem;
    }

    .entry-date-input--full {
      width: 100%;
      min-width: 0;
    }

    .due-date-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .due-date-container.is-visible {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .modal-entry-dates {
      height: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      padding: 20px;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }

    .modal-title {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
    }

    .payment-toggle {
      margin-bottom: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-btn-cancel {
      flex: 1;
      background: #e2e8f0 !important;
      color: #475569 !important;
      box-shadow: none;
    }

    .modal-btn-save {
      flex: 1;
      background: var(--ok) !important;
      color: #fff !important;
    }

    .category-btn .emoji {
      font-size: 1.35rem;
      line-height: 1;
    }

    .category-btn.active {
      border-color: var(--primary);
      background: #e9f1ff;
      color: #123d92;
      box-shadow: 0 6px 14px rgba(33, 100, 243, 0.22);
    }

    .keypad {
      flex-grow: 1;
      flex-shrink: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .keypad.disabled {
      opacity: 0.4;
      filter: grayscale(100%);
      pointer-events: none;
    }

    .key-btn {
      height: 100%;
      min-height: 48px;
      font-size: 2rem;
      background: #ffffff;
      border: 2px solid var(--border);
      color: var(--text);
    }

    .key-btn.function-clear {
      background: var(--danger);
      color: #fff;
      font-size: 1.15rem;
      border: 2px solid transparent;
    }

    .key-btn.function-clear:active {
      background: var(--danger-press);
    }

    .key-btn.function-submit {
      background: var(--ok);
      color: #fff;
      font-size: 1.15rem;
      border: 2px solid transparent;
      grid-column: span 2;
    }

    .key-btn.function-equal {
      background: #2563eb;
      color: #fff;
      font-size: 1.2rem;
      border: 2px solid transparent;
    }

    .key-btn.function-submit:active {
      background: var(--ok-press);
    }

    .status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translate(-50%, -20px);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin: 0;
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
    }

    .status.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .status.error {
      background: var(--danger);
    }

    .status.success {
      background: var(--ok);
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-group {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }

    .history-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e6edf7;
      margin-bottom: 2px;
    }

    .history-group-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #123d92;
    }

    .history-group-subtotal {
      font-size: 1rem;
      font-weight: 800;
      color: #1348b2;
      white-space: nowrap;
    }

    .history-item {
      display: grid;
      gap: 6px;
      background: #f8fbff;
      border: 1px solid #dbe7f7;
      border-radius: 12px;
      padding: 10px;
    }

    .history-unpaid-banner {
      margin-top: 2px;
    }

    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .history-main {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .history-emoji {
      font-size: 1.5rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .history-title {
      font-size: 1.05rem;
      font-weight: 800;
    }

    .history-date {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 700;
    }

    .history-amount {
      font-size: 1.35rem;
      font-weight: 800;
      color: #1348b2;
      white-space: nowrap;
    }

    .paid-tag {
      display: inline-block;
      background: #eef3fa;
      border: 1px solid #ccd9ec;
      color: #3d5066;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .delete-btn {
      border: 2px solid #f2bbb6;
      background: #fff3f2;
      color: #b1261a;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
    }

    .delete-btn:active {
      transform: scale(0.97);
      background: #fce3e0;
    }

    .undo-btn {
      border: 2px solid #fbd38d;
      background: #fffaf0;
      color: #dd6b20;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .undo-btn:active {
      transform: scale(0.97);
    }

    .history-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
    }

    .unpaid-warning {
      display: inline-block;
      width: 100%;
      max-width: 100%;
      background: #fde8e8;
      border: 2px solid #ea4335;
      color: #9b1c1c;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.3;
      box-shadow: 0 2px 6px rgba(234, 67, 53, 0.15);
    }

    .mark-paid-btn {
      border: 2px solid #8fcd9f;
      background: #e8f8ee;
      color: #0d6e36;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
    }

    .mark-paid-btn:active {
      transform: scale(0.97);
      background: #d4f0dc;
    }

    .empty-state {
      text-align: center;
      padding: 24px 12px;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 700;
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: 16px;
    }

    .clear-all-wrap {
      margin-top: 8px;
    }

    .clear-all-btn {
      width: 100%;
      border: 2px solid #f2bbb6;
      background: #fff3f2;
      color: #b1261a;
      border-radius: 12px;
      padding: 12px 10px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .clear-all-btn:active {
      transform: scale(0.98);
      background: #fce3e0;
    }

    .settings-add-card {
      display: grid;
      gap: 10px;
    }

    .settings-section-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      color: #123d92;
    }

    .settings-form-row {
      display: grid;
      gap: 4px;
    }

    .settings-text-input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    @keyframes settings-input-flash {
      0% { box-shadow: 0 0 0 0 rgba(33, 100, 243, 0.45); }
      100% { box-shadow: 0 0 0 6px rgba(33, 100, 243, 0); }
    }

    .settings-text-input.flash-ring {
      animation: settings-input-flash 0.4s ease-out;
    }

    .emoji-quick-hint {
      margin: 0 0 4px;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--muted);
    }

    .emoji-quick-pick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .quick-emoji-btn {
      font-family: inherit;
      line-height: 1;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .quick-emoji-btn:active {
      transform: scale(0.9);
    }

    .settings-form-actions {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .settings-form-actions .settings-add-btn {
      flex: 1;
      min-width: 0;
    }

    .settings-add-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
    }

    .settings-add-btn:active {
      background: var(--primary-press);
    }

    .settings-cancel-edit-btn {
      flex-shrink: 0;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 800;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-cancel-edit-btn:active {
      filter: brightness(0.96);
    }

    .settings-status {
      min-height: 1.2em;
      margin: 0;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
    }

    .settings-status.error {
      color: var(--danger);
    }

    .settings-status.success {
      color: var(--ok);
    }

    .settings-list {
      display: grid;
      gap: 8px;
    }

    .settings-cat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .settings-cat-order {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
    }

    .settings-cat-order-btn {
      background: none;
      border: 1px solid #d9e2ef;
      border-radius: 6px;
      font-size: 1.2rem;
      padding: 4px;
      cursor: pointer;
      color: #5f6f82;
      line-height: 1;
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-cat-order-btn:active {
      transform: scale(0.97);
    }

    .settings-cat-order-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .settings-cat-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .settings-cat-emoji {
      font-size: 1.6rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .settings-cat-name {
      font-size: 1.05rem;
      font-weight: 800;
      word-break: break-word;
    }

    .settings-cat-actions {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      gap: 8px;
    }

    .settings-cat-edit {
      flex-shrink: 0;
      border: 2px solid #9bc4ff;
      background: #eef6ff;
      color: #1565c0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-cat-edit:active {
      transform: scale(0.97);
    }

    .settings-cat-delete {
      flex-shrink: 0;
      border: 2px solid #f2bbb6;
      background: #fff3f2;
      color: #b1261a;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
    }

    .settings-cat-delete:active {
      transform: scale(0.97);
    }

    .settings-cat-delete:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(100%, 560px);
      background: #ffffff;
      border-top: 2px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 8px;
      gap: 8px;
      z-index: 20;
    }

    .tab-btn {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 1rem;
      font-weight: 800;
      color: var(--muted);
      background: #f8fbff;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #123d92;
      border-color: var(--primary);
      background: #e9f1ff;
    }

    .tab-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 380px) {
      .category-btn {
        min-height: 64px;
        font-size: 0.75rem;
      }

      .key-btn {
        min-height: 48px;
      }
    }

    @media (max-height: 700px) {
      .app {
        padding-top: 6px;
      }

      .view {
        gap: 4px;
        padding-bottom: 60px;
      }

      #view-entry .display {
        padding: 4px 10px;
      }

      .selected-category,
      .selected-category.is-picked {
        display: none !important;
      }

      .category-grid {
        display: flex;
        overflow-x: auto;
        flex-wrap: nowrap;
        gap: 8px;
        padding-bottom: 8px;
        max-height: none !important;
        overflow-y: visible;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .category-grid::-webkit-scrollbar {
        display: none;
      }

      .category-btn {
        min-width: 80px;
        flex-shrink: 0;
        min-height: 60px !important;
        font-size: 0.85rem !important;
        gap: 0;
        padding: 4px;
      }

      .category-btn .emoji {
        font-size: 1.6rem !important;
      }

      .keypad {
        gap: 4px;
      }

      .key-btn {
        min-height: 44px;
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="view-entry" class="view active">
      <section class="display">
        <p class="amount-text" id="amountDisplay">$0.00</p>
        <div class="entry-meta-row entry-meta-row--category">
          <p class="selected-category" id="selectedCategoryDisplay">尚未選擇分類</p>
        </div>
      </section>

  <script>
    (function () {
      var STORAGE_KEY = "travel-expense-records";
      var CATEGORIES_KEY = "expense-categories";
      var selectedCategory = "";
      var amountText = "";
      var selectedPaymentStatus = "paid";
      var editingCategoryName = null;
      var statusTimeout;

      var DEFAULT_CATEGORIES = [
        { name: "買餸", emoji: "🛒" },
        { name: "食飯", emoji: "🍜" },
        { name: "水費", emoji: "💧" },
        { name: "電費", emoji: "⚡" },
        { name: "煤氣", emoji: "🔥" },
        { name: "搭車", emoji: "🚌" },
        { name: "雜費", emoji: "🏠" },
        { name: "管理費", emoji: "🏢" },
        { name: "卡數 (HSBC)", emoji: "💳" },
        { name: "卡數 (恆生)", emoji: "💳" },
        { name: "卡數 (渣打)", emoji: "💳" }
      ];

      var amountDisplay = document.getElementById("amountDisplay");
      var selectedCategoryDisplay = document.getElementById("selectedCategoryDisplay");
      var statusMessage = document.getElementById("statusMessage");
      var categoryGrid = document.getElementById("categoryGrid");
      var keyButtons = document.querySelectorAll(".key-btn[data-key]");
      var clearBtn = document.getElementById("clearBtn");
      var backspaceBtn = document.getElementById("backspaceBtn");
      var equalBtn = document.getElementById("equalBtn");
      var submitBtn = document.getElementById("submitBtn");
      var keypad = document.getElementById("keypad");
      var entryDateInput = document.getElementById("entryDateInput");
      var entryDateLabel = document.getElementById("entryDateLabel");
      var dueDateContainer = document.getElementById("dueDateContainer");
      var dueDateInput = document.getElementById("dueDateInput");
      var btnStatusPaid = document.getElementById("btnStatusPaid");
      var btnStatusUnpaid = document.getElementById("btnStatusUnpaid");
      var dateModal = document.getElementById("dateModal");
      var modalCancelBtn = document.getElementById("modalCancelBtn");
      var modalSaveBtn = document.getElementById("modalSaveBtn");
      var historyList = document.getElementById("historyList");
      var clearAllBtn = document.getElementById("clearAllBtn");
      var historyMonthInput = document.getElementById("historyMonthInput");
      var settingsEmojiInput = document.getElementById("settingsEmojiInput");
      var settingsNameInput = document.getElementById("settingsNameInput");
      var settingsAddBtn = document.getElementById("settingsAddBtn");
      var settingsCancelEditBtn = document.getElementById("settingsCancelEditBtn");
      var settingsStatus = document.getElementById("settingsStatus");
      var settingsCategoryList = document.getElementById("settingsCategoryList");
      var emojiQuickPick = document.getElementById("emojiQuickPick");
      var tabButtons = document.querySelectorAll(".tab-btn");
      var views = {
        entry: document.getElementById("view-entry"),
        history: document.getElementById("view-history"),
        settings: document.getElementById("view-settings")
      };

      function formatMoney(value) {
        return "$" + Number(value || 0).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function getTodayString() {
        var now = new Date();
        var y = now.getFullYear();
        var m = String(now.getMonth() + 1).padStart(2, "0");
        var d = String(now.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + d;
      }

      function getCurrentMonthString() {
        return getTodayString().slice(0, 7);
      }

      function getRecordMonth(record) {
        if (!record || !record.date) return "";
        if (/^\d{4}-\d{2}-\d{2}/.test(record.date)) return record.date.slice(0, 7);
        var d = new Date(record.date);
        if (isNaN(d.getTime())) return "";
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, "0");
        return y + "-" + m;
      }

      function formatShortDate(isoString) {
        if (/^\d{4}-\d{2}-\d{2}/.test(isoString || "")) {
          return isoString.slice(0, 10);
        }
        var d = new Date(isoString);
        if (isNaN(d.getTime())) return "-";
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, "0");
        var day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function getRecords() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function setRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function initCategories() {
        var raw = localStorage.getItem(CATEGORIES_KEY);
        if (raw === null || raw === "" || raw === "undefined") {
          setCategories(DEFAULT_CATEGORIES.map(function (c) {
            return { name: c.name, emoji: c.emoji };
          }));
          return;
        }
        try {
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed) || parsed.length === 0) {
            setCategories(DEFAULT_CATEGORIES.map(function (c) {
              return { name: c.name, emoji: c.emoji };
            }));
          }
        } catch (err) {
          setCategories(DEFAULT_CATEGORIES.map(function (c) {
            return { name: c.name, emoji: c.emoji };
          }));
        }
      }

      function getCategories() {
        try {
          var raw = localStorage.getItem(CATEGORIES_KEY);
          var parsed = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(parsed)) return [];
          return parsed.map(function (item) {
            return {
              name: String(item.name || "").trim(),
              emoji: String(item.emoji || "").trim() || "🏷️"
            };
          }).filter(function (c) {
            return c.name.length > 0;
          });
        } catch (err) {
          return [];
        }
      }

      function setCategories(list) {
        localStorage.setItem(CATEGORIES_KEY, JSON.stringify(list));
      }

      function getEmojiForCategoryName(categoryName) {
        var name = categoryName || "";
        var cats = getCategories();
        for (var i = 0; i < cats.length; i++) {
          if (cats[i].name === name) return cats[i].emoji || "🏷️";
        }
        return "🏷️";
      }

      function renderCategories() {
        var cats = getCategories();
        if (!cats.length) {
          setCategories(DEFAULT_CATEGORIES.map(function (c) {
            return { name: c.name, emoji: c.emoji };
          }));
          cats = getCategories();
        }
        categoryGrid.innerHTML = "";
        cats.forEach(function (c) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn category-btn";
          btn.setAttribute("data-category", c.name);
          var spanE = document.createElement("span");
          spanE.className = "emoji";
          spanE.textContent = c.emoji || "🏷️";
          var spanN = document.createElement("span");
          spanN.textContent = c.name;
          btn.appendChild(spanE);
          btn.appendChild(spanN);
          categoryGrid.appendChild(btn);
        });
        if (selectedCategory && !cats.some(function (x) {
          return x.name === selectedCategory;
        })) {
          selectedCategory = "";
        }
        categoryGrid.querySelectorAll(".category-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-category") === selectedCategory);
        });
      }

      function setSettingsStatus(message, type) {
        settingsStatus.textContent = message || "";
        settingsStatus.className = "settings-status" + (type ? " " + type : "");
      }

      function exitCategoryEditMode() {
        editingCategoryName = null;
        settingsEmojiInput.value = "";
        settingsNameInput.value = "";
        settingsAddBtn.textContent = "新增分類";
        settingsCancelEditBtn.hidden = true;
      }

      function renderSettingsCategoryList() {
        var cats = getCategories().slice();
        settingsCategoryList.innerHTML = "";
        cats.forEach(function (c, index) {
          var row = document.createElement("div");
          row.className = "settings-cat-row";
          var order = document.createElement("div");
          order.className = "settings-cat-order";
          var up = document.createElement("button");
          up.type = "button";
          up.className = "settings-cat-order-btn";
          up.textContent = "⬆️";
          up.setAttribute("data-move-up", String(index));
          up.disabled = index === 0;
          var down = document.createElement("button");
          down.type = "button";
          down.className = "settings-cat-order-btn";
          down.textContent = "⬇️";
          down.setAttribute("data-move-down", String(index));
          down.disabled = index === cats.length - 1;
          order.appendChild(up);
          order.appendChild(down);
          var main = document.createElement("div");
          main.className = "settings-cat-main";
          var em = document.createElement("span");
          em.className = "settings-cat-emoji";
          em.textContent = c.emoji || "🏷️";
          var nm = document.createElement("span");
          nm.className = "settings-cat-name";
          nm.textContent = c.name;
          main.appendChild(em);
          main.appendChild(nm);
          var actions = document.createElement("div");
          actions.className = "settings-cat-actions";
          var edit = document.createElement("button");
          edit.type = "button";
          edit.className = "settings-cat-edit";
          edit.textContent = "編輯";
          edit.setAttribute("data-edit-category", c.name);
          var del = document.createElement("button");
          del.type = "button";
          del.className = "settings-cat-delete";
          del.textContent = "刪除";
          del.setAttribute("data-delete-category", c.name);
          if (cats.length <= 1) del.disabled = true;
          actions.appendChild(edit);
          actions.appendChild(del);
          row.appendChild(order);
          row.appendChild(main);
          row.appendChild(actions);
          settingsCategoryList.appendChild(row);
        });
      }

      function getRecordPaymentStatus(record) {
        return record.paymentStatus === "unpaid" ? "unpaid" : "paid";
      }

      /* Due-date visibility: CSS only (.due-date-container + .is-visible). Never set style.display on that node. */
      function syncEntryPaymentUI() {
        btnStatusPaid.classList.toggle("active-paid", selectedPaymentStatus === "paid");
        btnStatusUnpaid.classList.toggle("active-unpaid", selectedPaymentStatus === "unpaid");
        if (selectedPaymentStatus === "unpaid") {
          entryDateLabel.textContent = "📝 帳單日期";
          entryDateInput.setAttribute("aria-label", "帳單日期");
          dueDateContainer.classList.add("is-visible");
          dueDateContainer.setAttribute("aria-hidden", "false");
          dueDateInput.removeAttribute("tabindex");
        } else {
          entryDateLabel.textContent = "入數日期";
          entryDateInput.setAttribute("aria-label", "入數日期");
          dueDateContainer.classList.remove("is-visible");
          dueDateContainer.setAttribute("aria-hidden", "true");
          dueDateInput.setAttribute("tabindex", "-1");
          dueDateInput.value = "";
        }
      }

      function setPaymentStatus(status) {
        selectedPaymentStatus = status === "unpaid" ? "unpaid" : "paid";
        syncEntryPaymentUI();
      }

      function render() {
        var inputView = amountText;
        if (!inputView) {
          amountDisplay.textContent = "$0.00";
        } else {
          amountDisplay.textContent = "$" + inputView.replace(/\*/g, "×").replace(/\//g, "÷");
        }
        selectedCategoryDisplay.textContent = selectedCategory
          ? "已選擇: " + selectedCategory
          : "尚未選擇分類";
        selectedCategoryDisplay.classList.toggle("is-picked", !!selectedCategory);
        selectedCategoryDisplay.setAttribute(
          "aria-hidden",
          selectedCategory ? "false" : "true"
        );
        keypad.classList.toggle("disabled", !selectedCategory);
        syncEntryPaymentUI();
      }

      function renderHistory() {
        var selectedMonth = historyMonthInput.value || getCurrentMonthString();
        var records = getRecords().filter(function (record) {
          return getRecordMonth(record) === selectedMonth;
        }).slice().reverse();

        if (!records.length) {
          historyList.innerHTML = '<div class="empty-state">未有任何紀錄</div>';
          return;
        }

        var grouped = {};
        records.forEach(function (record) {
          var cat = record.category || "未分類";
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(record);
        });

        var categoryOrder = Object.keys(grouped).sort(function (a, b) {
          return a.localeCompare(b, "zh-Hant");
        });

        historyList.innerHTML = categoryOrder.map(function (category) {
          var items = grouped[category];
          var subtotal = items.reduce(function (sum, item) {
            return sum + Number(item.amount || 0);
          }, 0);
          var emoji = getEmojiForCategoryName(category);

          var itemsHtml = items.map(function (record) {
            var isUnpaid = getRecordPaymentStatus(record) === "unpaid";
            var dueDisplay = "—";
            if (isUnpaid && record.dueDate && /^\d{4}-\d{2}-\d{2}/.test(record.dueDate)) {
              dueDisplay = formatShortDate(record.dueDate);
            }
            var unpaidHtml = isUnpaid
              ? '<div class="unpaid-warning">⚠️ 未交 (到期: ' + dueDisplay + ')</div>'
              : "";
            var markPaidHtml = isUnpaid
              ? '<button class="mark-paid-btn" type="button" data-mark-paid-id="' + record.id + '">✅ 標記已交</button>'
              : "";
            var undoMarkPaidHtml =
              record.paymentStatus === "paid" && record.dueDate
                ? '<button class="undo-btn" type="button" data-mark-unpaid-id="' + record.id + '">⏪ 撤銷</button>'
                : "";
            return (
              '<article class="history-item">' +
                '<div class="history-row">' +
                  '<div class="history-main">' +
                    '<span class="history-date">' + formatShortDate(record.date) + '</span>' +
                  '</div>' +
                  '<div class="history-amount">' + formatMoney(record.amount) + '</div>' +
                '</div>' +
                (isUnpaid ? '<div class="history-unpaid-banner">' + unpaidHtml + '</div>' : '') +
                '<div class="history-row">' +
                  '<span class="paid-tag">由 ' + (record.paidBy || "Mom") + ' 付款</span>' +
                  '<div class="history-actions">' +
                    markPaidHtml +
                    undoMarkPaidHtml +
                    '<button class="delete-btn" type="button" data-delete-id="' + record.id + '">刪除</button>' +
                  '</div>' +
                '</div>' +
              '</article>'
            );
          }).join("");

          return (
            '<section class="history-group">' +
              '<div class="history-group-header">' +
                '<div class="history-group-title">' + emoji + " " + category + '</div>' +
                '<div class="history-group-subtotal">小計: ' + formatMoney(subtotal) + '</div>' +
              '</div>' +
              itemsHtml +
            '</section>'
          );
        }).join("");
      }

      function switchView(viewName) {
        Object.keys(views).forEach(function (key) {
          views[key].classList.toggle("active", key === viewName);
        });
        tabButtons.forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-view") === viewName);
        });

        if (viewName === "history") renderHistory();
        if (viewName === "settings") {
          renderSettingsCategoryList();
          setSettingsStatus("", "");
        }
        if (viewName === "entry") {
          renderCategories();
          render();
        }
      }

      function setStatus(message, type) {
        clearTimeout(statusTimeout);
        if (!message) {
          statusMessage.classList.remove("show");
          return;
        }
        statusMessage.textContent = message;
        statusMessage.className = "status show " + (type || "");
        statusTimeout = setTimeout(function () {
          statusMessage.classList.remove("show");
        }, 2500);
      }

      function isOperator(char) {
        return ["+", "-", "*", "/"].indexOf(char) !== -1;
      }

      function getLastOperand(text) {
        var parts = text.split(/[+\-*/]/);
        return parts[parts.length - 1] || "";
      }

      function appendKey(key) {
        if (!key) return;

        var lastChar = amountText.slice(-1);
        var isLastOperator = isOperator(lastChar);
        var isLastDot = lastChar === ".";

        if (isOperator(key)) {
          if (!amountText || isLastOperator || isLastDot) return;
          amountText += key;
          return;
        }

        if (key === ".") {
          if (!amountText || isLastOperator) {
            amountText += "0.";
            return;
          }
          if (isLastDot) return;
          var lastOperand = getLastOperand(amountText);
          if (lastOperand.indexOf(".") !== -1) return;
          amountText += ".";
          return;
        }

        if (!/^\d$/.test(key)) return;
        var currentOperand = getLastOperand(amountText);
        var decimalPart = currentOperand.split(".")[1] || "";
        if (currentOperand.indexOf(".") !== -1 && decimalPart.length >= 2) return;
        if (amountText.length >= 30) return;
        amountText += key;
      }

      function evaluateExpression() {
        if (!amountText) return null;
        var expr = amountText.trim();
        if (!expr) return null;
        if (isOperator(expr.slice(-1)) || expr.slice(-1) === ".") return null;
        if (!/^[0-9+\-*/.\s]+$/.test(expr)) return null;

        try {
          var result = new Function("return (" + expr + ")")();
          if (typeof result !== "number" || !isFinite(result)) return null;
          var rounded = Math.round(result * 100) / 100;
          return rounded;
        } catch (error) {
          return null;
        }
      }

      function clearAmount() {
        amountText = "";
      }

      function backspaceAmount() {
        if (!amountText) return;
        amountText = amountText.slice(0, -1);
      }

      function closeDateModal() {
        dateModal.classList.remove("show");
        dateModal.setAttribute("aria-hidden", "true");
        selectedPaymentStatus = "paid";
        syncEntryPaymentUI();
      }

      function openConfirmModal() {
        if (!selectedCategory) {
          setStatus("請先選擇分類", "error");
          return;
        }
        var finalAmount = evaluateExpression();
        if (finalAmount === null || finalAmount <= 0) {
          setStatus("請輸入有效金額", "error");
          return;
        }
        if (!entryDateInput.value) {
          entryDateInput.value = getTodayString();
        }
        selectedPaymentStatus = "paid";
        syncEntryPaymentUI();
        dateModal.classList.add("show");
        dateModal.setAttribute("aria-hidden", "false");
      }

      function persistRecordFromModal() {
        if (!selectedCategory) {
          setStatus("請先選擇分類", "error");
          return;
        }
        var finalAmount = evaluateExpression();
        if (finalAmount === null || finalAmount <= 0) {
          setStatus("請輸入有效金額", "error");
          return;
        }
        amountText = String(finalAmount);
        if (selectedPaymentStatus === "unpaid" && !dueDateInput.value) {
          setStatus("請輸入到期日", "error");
          return;
        }

        var record = {
          id: Date.now().toString(),
          amount: finalAmount,
          category: selectedCategory,
          date: entryDateInput.value || getTodayString(),
          paidBy: "Mom",
          paymentStatus: selectedPaymentStatus
        };
        if (selectedPaymentStatus === "unpaid") {
          record.dueDate = dueDateInput.value || null;
        }

        try {
          var list = getRecords();
          list.push(record);
          setRecords(list);

          amountText = "";
          selectedCategory = "";
          dueDateInput.value = "";
          categoryGrid.querySelectorAll(".category-btn").forEach(function (btn) {
            btn.classList.remove("active");
          });
          closeDateModal();
          render();
          setStatus("已儲存紀錄", "success");
          renderHistory();
        } catch (error) {
          setStatus("儲存失敗，請稍後再試", "error");
        }
      }

      categoryGrid.addEventListener("click", function (event) {
        var btn = event.target.closest(".category-btn");
        if (!btn || !categoryGrid.contains(btn)) return;
        selectedCategory = btn.getAttribute("data-category") || "";
        categoryGrid.querySelectorAll(".category-btn").forEach(function (b) {
          b.classList.toggle("active", b === btn);
        });
        render();
        setStatus("", "");
      });

      keyButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          appendKey(button.getAttribute("data-key") || "");
          render();
          setStatus("", "");
        });
      });

      clearBtn.addEventListener("click", function () {
        clearAmount();
        render();
        setStatus("已清除金額", "");
      });

      backspaceBtn.addEventListener("click", function () {
        backspaceAmount();
        render();
        setStatus("", "");
      });

      equalBtn.addEventListener("click", function () {
        var finalAmount = evaluateExpression();
        if (finalAmount === null) {
          setStatus("算式無效", "error");
          return;
        }
        amountText = String(finalAmount);
        render();
        setStatus("已計算", "success");
      });

      submitBtn.addEventListener("click", openConfirmModal);

      modalCancelBtn.addEventListener("click", function () {
        setStatus("", "");
        closeDateModal();
      });

      modalSaveBtn.addEventListener("click", function () {
        persistRecordFromModal();
      });

      btnStatusPaid.addEventListener("click", function () {
        setPaymentStatus("paid");
        setStatus("", "");
      });

      btnStatusUnpaid.addEventListener("click", function () {
        setPaymentStatus("unpaid");
        setStatus("", "");
      });

      tabButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          switchView(button.getAttribute("data-view") || "entry");
        });
      });

      historyList.addEventListener("click", function (event) {
        var target = event.target;
        if (!target) return;
        if (target.matches("[data-mark-paid-id]")) {
          var markId = target.getAttribute("data-mark-paid-id");
          var updated = getRecords().map(function (item) {
            if (item.id === markId) {
              var copy = {};
              for (var k in item) {
                if (Object.prototype.hasOwnProperty.call(item, k)) copy[k] = item[k];
              }
              copy.paymentStatus = "paid";
              return copy;
            }
            return item;
          });
          setRecords(updated);
          renderHistory();
          return;
        }
        if (target.matches("[data-mark-unpaid-id]")) {
          var unpaidId = target.getAttribute("data-mark-unpaid-id");
          var reverted = getRecords().map(function (item) {
            if (item.id === unpaidId) {
              var copy = {};
              for (var k in item) {
                if (Object.prototype.hasOwnProperty.call(item, k)) copy[k] = item[k];
              }
              copy.paymentStatus = "unpaid";
              return copy;
            }
            return item;
          });
          setRecords(reverted);
          renderHistory();
          return;
        }
        if (!target.matches("[data-delete-id]")) return;
        var recordId = target.getAttribute("data-delete-id");
        var records = getRecords().filter(function (item) {
          return item.id !== recordId;
        });
        setRecords(records);
        renderHistory();
      });

      clearAllBtn.addEventListener("click", function () {
        var ok = confirm("確定要清空所有紀錄？");
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEY);
        renderHistory();
        setStatus("已清空所有紀錄", "success");
      });

      historyMonthInput.addEventListener("change", function () {
        renderHistory();
      });

      emojiQuickPick.addEventListener("click", function (event) {
        var btn = event.target.closest(".quick-emoji-btn");
        if (!btn || !emojiQuickPick.contains(btn)) return;
        var ch = (btn.textContent || "").trim();
        if (!ch) return;
        settingsEmojiInput.value = ch;
        settingsEmojiInput.classList.remove("flash-ring");
        void settingsEmojiInput.offsetWidth;
        settingsEmojiInput.classList.add("flash-ring");
        setTimeout(function () {
          settingsEmojiInput.classList.remove("flash-ring");
        }, 400);
        settingsNameInput.focus();
      });

      settingsAddBtn.addEventListener("click", function () {
        var emoji = (settingsEmojiInput.value || "").trim();
        var name = (settingsNameInput.value || "").trim();
        if (!name) {
          setSettingsStatus("請輸入分類名稱", "error");
          return;
        }
        var cats = getCategories();
        if (editingCategoryName !== null) {
          var dup = cats.some(function (c) {
            return c.name === name && c.name !== editingCategoryName;
          });
          if (dup) {
            setSettingsStatus("已有相同名稱嘅分類", "error");
            return;
          }
          if (!emoji) emoji = "🏷️";
          var oldName = editingCategoryName;
          var idx = cats.findIndex(function (c) {
            return c.name === oldName;
          });
          if (idx === -1) {
            setSettingsStatus("找不到要修改嘅分類", "error");
            exitCategoryEditMode();
            renderSettingsCategoryList();
            return;
          }
          cats[idx] = { name: name, emoji: emoji };
          setCategories(cats);
          var records = getRecords();
          var cascaded = records.map(function (r) {
            if (r.category === oldName) {
              var copy = {};
              for (var key in r) {
                if (Object.prototype.hasOwnProperty.call(r, key)) {
                  copy[key] = r[key];
                }
              }
              copy.category = name;
              return copy;
            }
            return r;
          });
          setRecords(cascaded);
          if (selectedCategory === oldName) {
            selectedCategory = name;
          }
          exitCategoryEditMode();
          setSettingsStatus("已儲存分類修改", "success");
          renderCategories();
          render();
          renderSettingsCategoryList();
          renderHistory();
          return;
        }
        if (cats.some(function (c) {
          return c.name === name;
        })) {
          setSettingsStatus("已有相同名稱嘅分類", "error");
          return;
        }
        if (!emoji) emoji = "🏷️";
        cats.push({ name: name, emoji: emoji });
        setCategories(cats);
        settingsEmojiInput.value = "";
        settingsNameInput.value = "";
        setSettingsStatus("已新增分類", "success");
        renderCategories();
        renderSettingsCategoryList();
      });

      settingsCancelEditBtn.addEventListener("click", function () {
        exitCategoryEditMode();
        setSettingsStatus("", "");
      });

      settingsCategoryList.addEventListener("click", function (event) {
        var target = event.target;
        if (!target) return;
        var moveUpBtn = target.closest("[data-move-up]");
        if (moveUpBtn) {
          var upIndex = parseInt(moveUpBtn.getAttribute("data-move-up") || "-1", 10);
          if (!isFinite(upIndex) || upIndex <= 0) return;
          var listUp = getCategories();
          if (upIndex >= listUp.length) return;
          var tmpUp = listUp[upIndex - 1];
          listUp[upIndex - 1] = listUp[upIndex];
          listUp[upIndex] = tmpUp;
          setCategories(listUp);
          renderSettingsCategoryList();
          renderCategories();
          renderHistory();
          return;
        }
        var moveDownBtn = target.closest("[data-move-down]");
        if (moveDownBtn) {
          var downIndex = parseInt(moveDownBtn.getAttribute("data-move-down") || "-1", 10);
          var listDown = getCategories();
          if (!isFinite(downIndex) || downIndex < 0) return;
          if (downIndex >= listDown.length - 1) return;
          var tmpDown = listDown[downIndex + 1];
          listDown[downIndex + 1] = listDown[downIndex];
          listDown[downIndex] = tmpDown;
          setCategories(listDown);
          renderSettingsCategoryList();
          renderCategories();
          renderHistory();
          return;
        }
        var editBtn = target.closest("[data-edit-category]");
        if (editBtn) {
          var editName = editBtn.getAttribute("data-edit-category");
          var list = getCategories();
          var found = list.find(function (c) {
            return c.name === editName;
          });
          if (!found) return;
          editingCategoryName = editName;
          settingsEmojiInput.value = found.emoji || "🏷️";
          settingsNameInput.value = found.name;
          settingsAddBtn.textContent = "儲存修改";
          settingsCancelEditBtn.hidden = false;
          setSettingsStatus("", "");
          var addCard = document.querySelector(".settings-add-card");
          if (addCard) {
            addCard.scrollIntoView({ behavior: "smooth", block: "start" });
          }
          settingsNameInput.focus();
          return;
        }
        if (!target.matches("[data-delete-category]")) return;
        if (target.disabled) return;
        var name = target.getAttribute("data-delete-category");
        var cats = getCategories();
        if (cats.length <= 1) {
          setSettingsStatus("至少要保留一個分類", "error");
          return;
        }
        var next = cats.filter(function (c) {
          return c.name !== name;
        });
        setCategories(next);
        if (selectedCategory === name) {
          selectedCategory = "";
        }
        setSettingsStatus("已刪除分類", "success");
        renderCategories();
        render();
        renderSettingsCategoryList();
        renderHistory();
      });

      entryDateInput.value = getTodayString();
      historyMonthInput.value = getCurrentMonthString();
      initCategories();
      renderCategories();
      syncEntryPaymentUI();
      render();
      renderHistory();
    })();
  </script>
</body>
</html>
