<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="260" fill="#e8f5e9"/>
  <!-- Two dice -->
  <g transform="translate(100, 70)" stroke="#2e7d32" stroke-width="3" fill="#fff">
    <rect x="0" y="0" width="80" height="80" rx="12"/>
    <circle cx="20" cy="20" r="8" fill="#2e7d32"/>
    <circle cx="60" cy="20" r="8" fill="#2e7d32"/>
    <circle cx="40" cy="40" r="8" fill="#2e7d32"/>
    <circle cx="20" cy="60" r="8" fill="#2e7d32"/>
    <circle cx="60" cy="60" r="8" fill="#2e7d32"/>
  </g>
  <g transform="translate(200, 90)" stroke="#2e7d32" stroke-width="3" fill="#fff">
    <rect x="0" y="0" width="80" height="80" rx="12"/>
    <circle cx="20" cy="20" r="8" fill="#2e7d32"/>
    <circle cx="60" cy="60" r="8" fill="#2e7d32"/>
    <circle cx="40" cy="40" r="8" fill="#2e7d32"/>
  </g>
  <!-- Name list -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="200" height="8" rx="2" fill="#81c784"/>
    <rect x="0" y="14" width="160" height="8" rx="2" fill="#a5d6a7"/>
    <rect x="0" y="28" width="180" height="8" rx="2" fill="#a5d6a7"/>
  </g>
</svg>
