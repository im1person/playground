<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="260" fill="#e3f2fd"/>
  <!-- Key -->
  <g transform="translate(120, 70)" stroke="#1565c0" stroke-width="4" fill="none">
    <circle cx="50" cy="50" r="25"/>
    <rect x="65" y="45" width="60" height="10" rx="2"/>
    <rect x="115" y="35" width="8" height="30" rx="2"/>
    <rect x="125" y="35" width="8" height="30" rx="2"/>
    <rect x="135" y="45" width="8" height="20" rx="2"/>
  </g>
  <!-- Lock -->
  <g transform="translate(220, 85)" stroke="#1565c0" stroke-width="4" fill="#fff">
    <path d="M 30 50 L 30 35 Q 30 15 50 15 Q 70 15 70 35 L 70 50 Z"/>
    <rect x="35" y="50" width="30" height="40" rx="4"/>
    <circle cx="50" cy="75" r="5" fill="#1565c0"/>
  </g>
  <!-- Dots (password hint) -->
  <circle cx="180" cy="200" r="8" fill="#1976d2"/>
  <circle cx="210" cy="200" r="8" fill="#1976d2"/>
  <circle cx="240" cy="200" r="8" fill="#1976d2"/>
</svg>
