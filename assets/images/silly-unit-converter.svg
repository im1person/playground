<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="260" fill="#fff3e0"/>
  <!-- Ruler / scale -->
  <g transform="translate(80, 80)" stroke="#e65100" stroke-width="3">
    <rect x="0" y="30" width="240" height="40" rx="6" fill="#ffcc80"/>
    <line x1="30" y1="30" y2="70" stroke-width="2"/>
    <line x1="60" y1="30" y2="70" stroke-width="2"/>
    <line x1="90" y1="30" y2="70" stroke-width="2"/>
    <line x1="120" y1="30" y2="70" stroke-width="2"/>
    <line x1="150" y1="30" y2="70" stroke-width="2"/>
    <line x1="180" y1="30" y2="70" stroke-width="2"/>
    <line x1="210" y1="30" y2="70" stroke-width="2"/>
    <line x1="240" y1="30" y2="70" stroke-width="2"/>
  </g>
  <!-- Coffee cup -->
  <g transform="translate(280, 100)">
    <ellipse cx="30" cy="15" rx="28" ry="10" fill="#8d6e63" stroke="#5d4037" stroke-width="2"/>
    <path d="M 2 15 L 8 15 L 8 80 L 52 80 L 58 15 Z" fill="#a1887f" stroke="#5d4037" stroke-width="2"/>
    <path d="M 58 25 L 75 20 L 75 45 L 58 50 Z" fill="none" stroke="#5d4037" stroke-width="2"/>
  </g>
  <!-- Football pitch outline -->
  <rect x="140" y="160" width="120" height="70" rx="4" fill="none" stroke="#2e7d32" stroke-width="3"/>
  <circle cx="200" cy="195" r="15" fill="none" stroke="#2e7d32" stroke-width="2"/>
</svg>
