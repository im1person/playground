<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="260" fill="#e0f7fa"/>
  <!-- Clock face -->
  <g transform="translate(200, 110)">
    <circle cx="0" cy="0" r="70" fill="#fff" stroke="#0097a7" stroke-width="4"/>
    <circle cx="0" cy="0" r="4" fill="#0097a7"/>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#0097a7" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="20" stroke="#0097a7" stroke-width="3" stroke-linecap="round"/>
    <!-- 12 markers -->
    <line x1="0" y1="-65" x2="0" y2="-58" stroke="#0097a7" stroke-width="2"/>
    <line x1="56" y1="-32" x2="52" y2="-28" stroke="#0097a7" stroke-width="2"/>
    <line x1="0" y1="58" x2="0" y2="65" stroke="#0097a7" stroke-width="2"/>
    <line x1="-56" y1="32" x2="-52" y2="28" stroke="#0097a7" stroke-width="2"/>
  </g>
  <!-- Days display -->
  <g transform="translate(120, 190)">
    <rect x="0" y="0" width="50" height="36" rx="6" fill="#0097a7"/>
    <text x="25" y="26" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
    <text x="25" y="52" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#006064">days</text>
  </g>
  <g transform="translate(250, 190)">
    <rect x="0" y="0" width="50" height="36" rx="6" fill="#0097a7"/>
    <text x="25" y="26" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#fff">12</text>
    <text x="25" y="52" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#006064">hrs</text>
  </g>
</svg>
